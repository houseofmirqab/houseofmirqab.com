<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscribe — House of Mirqab</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#ffffff;
    color:#0D1B3E;
    font-family:'Cormorant Garamond', serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.subscribe-container{
    width:460px;
    text-align:center;
    padding:40px;
}

.logo{
    font-size:64px;
    font-weight:700;
    line-height:1;
    margin-bottom:10px;
}

.logo-ar{
    font-family:'Amiri', serif;
    font-size:28px;
    margin-bottom:30px;
}

.line{
    width:80px;
    height:1px;
    background:#0D1B3E;
    margin:0 auto 30px;
}

.description{
    font-size:20px;
    line-height:1.7;
    color:#3d4a68;
    margin-bottom:35px;
}

input{
    width:100%;
    padding:18px;
    border:1px solid #0D1B3E;
    font-size:16px;
    margin-bottom:18px;
    font-family:'Cormorant Garamond', serif;
}

button{
    width:100%;
    padding:18px;
    background:#0D1B3E;
    color:white;
    border:none;
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    cursor:pointer;
}

.note{
    margin-top:20px;
    font-size:14px;
    color:#7a7a7a;
    font-style:italic;
}

</style>
</head>

<body>

<div class="subscribe-container">

    <div class="logo">House of Mirqab</div>
    <div class="logo-ar">بيت المرقاب</div>

    <div class="line"></div>

    <div class="description">
        Essays, criticism, fiction, and cultural writing delivered occasionally.
    </div>

    <input type="email" placeholder="Enter your email">

    <button>Subscribe</button>

    <div class="note">
        Free forever · No spam
    </div>

</div>

</body>
</html>
